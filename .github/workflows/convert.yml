name: Convert Subscriptions
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install dependencies
        run: pip install pyyaml requests -q

      - name: Download and convert
        run: |
          python3 << 'EOF'
          import urllib.parse, yaml, requests, re

          urls = [
              "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/Vless-Reality-White-Lists-Rus-Mobile.txt",
              "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/Vless-Reality-White-Lists-Rus-Mobile-2.txt"
          ]

          proxies = []
          seen = set()
          country_count = {}

          def extract_country(remarks):
              remarks = urllib.parse.unquote(remarks)
              clean = re.split(r'[|\[]', remarks)[0].strip()
              return clean if clean else None

          for url in urls:
              r = requests.get(url)
              for line in r.text.splitlines():
                  line = line.strip()
                  if not line.startswith('vless://'):
                      continue
                  try:
                      remarks_raw = line.split('#')[1] if '#' in line else ''
                      country = extract_country(remarks_raw)

                      rest = line[8:]
                      if '#' in rest:
                          rest = rest[:rest.index('#')]

                      at = rest.rindex('@')
                      uuid = rest[:at]
                      rest2 = rest[at+1:]

                      if rest2.startswith('['):
                          bracket = rest2.index(']')
                          server = rest2[1:bracket]
                          rest3 = rest2[bracket+2:]
                      else:
                          colon = rest2.index(':')
                          server = rest2[:colon]
                          rest3 = rest2[colon+1:]

                      q = rest3.index('?')
                      port = rest3[:q]
                      params = dict(urllib.parse.parse_qsl(rest3[q+1:]))

                      security = params.get('security', 'none')
                      network = params.get('type', 'tcp')
                      sni = params.get('sni', params.get('peer', ''))
                      pbk = params.get('pbk', '')
                      sid = params.get('sid', '')
                      flow = params.get('flow', '')
                      fp_raw = params.get('fp', 'chrome')
                      fp = 'chrome' if fp_raw not in ['chrome', 'firefox', 'safari', 'ios', 'android', 'edge', 'random'] else fp_raw

                      if security != 'reality' or not pbk:
                          continue

                      key = f"{server}:{port}:{uuid}"
                      if key in seen:
                          continue
                      seen.add(key)

                      if country:
                          country_count[country] = country_count.get(country, 0) + 1
                          name = f"{country} {country_count[country]}"
                      else:
                          name = f"{server}:{port}"

                      proxy = {
                          'name': name,
                          'type': 'vless',
                          'server': server,
                          'port': int(port),
                          'uuid': uuid,
                          'network': network,
                          'tls': True,
                          'udp': True,
                          'servername': sni,
                          'flow': flow,
                          'reality-opts': {
                              'public-key': pbk,
                              'short-id': sid
                          },
                          'client-fingerprint': fp
                      }
                      proxies.append(proxy)
                  except Exception as e:
                      continue

          print(f"Converted {len(proxies)} proxies")
          with open('clash.yaml', 'w') as f:
              yaml.dump({'proxies': proxies}, f, allow_unicode=True, default_flow_style=False)
          EOF

      - name: Commit
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          cp clash.yaml /tmp/clash.yaml
          git fetch origin
          git reset --hard origin/main
          cp /tmp/clash.yaml clash.yaml
          git add clash.yaml
          git commit -m "Update clash.yaml" --allow-empty
          git push
