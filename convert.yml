name: Convert Subscriptions
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install dependencies
        run: pip install pyyaml requests -q

      - name: Download and convert
        run: |
          python3 << 'EOF'
          import urllib.parse, yaml, requests

          urls = [
              "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/Vless-Reality-White-Lists-Rus-Mobile.txt",
              "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/Vless-Reality-White-Lists-Rus-Mobile-2.txt"
          ]

          proxies = []
          seen = set()

          for url in urls:
              r = requests.get(url)
              for line in r.text.splitlines():
                  line = line.strip()
                  if not line.startswith('vless://'):
                      continue
                  try:
                      rest = line[8:]
                      at = rest.index('@')
                      uuid = rest[:at]
                      rest2 = rest[at+1:]

                      if rest2.startswith('['):
                          bracket = rest2.index(']')
                          server = rest2[1:bracket]
                          rest2 = rest2[bracket+1:]
                          colon = rest2.index(':')
                          rest3 = rest2[colon+1:]
                      else:
                          colon = rest2.index(':')
                          server = rest2[:colon]
                          rest3 = rest2[colon+1:]

                      q = rest3.index('?')
                      port = rest3[:q]
                      params_str = rest3[q+1:]

                      if '#' in params_str:
                          params_str = params_str[:params_str.index('#')]

                      params = dict(urllib.parse.parse_qsl(params_str))

                      pbk = params.get('pbk', '')
                      sid = params.get('sid', '')
                      sni = params.get('sni', params.get('peer', ''))

                      if not pbk:
                          continue

                      key = f"{server}:{port}:{uuid}"
                      if key in seen:
                          continue
                      seen.add(key)

                      proxy = {
                          'name': f"{server}:{port}",
                          'type': 'vless',
                          'server': server,
                          'port': int(port),
                          'uuid': uuid,
                          'network': 'tcp',
                          'tls': True,
                          'udp': True,
                          'servername': sni,
                          'flow': 'xtls-rprx-vision',
                          'reality-opts': {
                              'public-key': pbk,
                              'short-id': sid
                          },
                          'client-fingerprint': 'chrome'
                      }
                      proxies.append(proxy)
                  except Exception as e:
                      continue

          print(f"Converted {len(proxies)} proxies")
          with open('clash.yaml', 'w') as f:
              yaml.dump({'proxies': proxies}, f, allow_unicode=True, default_flow_style=False)
          EOF

      - name: Commit
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add clash.yaml
          git diff --staged --quiet || (git commit -m "Update clash.yaml" && git pull --rebase && git push)
